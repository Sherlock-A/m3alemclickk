version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: m3allemclick_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: m3allemclick
      POSTGRES_USER: m3allemclick
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: m3allemclick_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
